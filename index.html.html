<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eCRF — ARTRA-301</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh}
:root{
  --surface-0:#f5f5f3;--surface-1:#ebebea;--surface-2:#ffffff;
  --border:#e0dfd8;--border-strong:#c8c7c0;--border-accent:#3b82f6;
  --text-primary:#1a1a18;--text-secondary:#5a5a56;--text-muted:#9a9a94;
  --text-accent:#1d4ed8;--text-success:#166534;--text-danger:#991b1b;--text-warning:#92400e;
  --bg-accent:#eff6ff;--bg-success:#f0fdf4;--bg-danger:#fef2f2;--bg-warning:#fffbeb;
  --fill-accent:#3b82f6;--fill-accent-hover:#2563eb;
  --border-success:#86efac;--border-danger:#fca5a5;--border-warning:#fcd34d;--border-accent-b:#93c5fd;
  --radius:8px;
}
.app{display:grid;grid-template-rows:auto auto 1fr;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:1rem}
.study-badge{background:var(--bg-accent);color:var(--text-accent);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.04em;border:1px solid var(--border-accent-b)}
.study-title{font-size:18px;font-weight:600;color:var(--text-primary)}
.study-sub{font-size:12px;color:var(--text-muted)}
.subject-bar{background:#fff;border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.subject-field{display:flex;flex-direction:column;gap:2px;min-width:120px}
.subject-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;font-weight:500}
.subject-val{font-size:14px;font-weight:600;color:var(--text-primary)}
.body{display:grid;grid-template-columns:210px 1fr;min-height:0}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:1rem;overflow-y:auto}
.sidebar-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:.75rem;padding:0 .25rem}
.visit-btn{display:block;width:100%;text-align:left;padding:.5rem .75rem;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-secondary);background:none;border:1px solid transparent;margin-bottom:3px;transition:all .15s}
.visit-btn:hover{background:var(--surface-1);color:var(--text-primary)}
.visit-btn.active{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent-b);font-weight:600}
.visit-num{font-size:10px;display:block;color:inherit;opacity:.7;margin-bottom:1px}
.main{padding:1.5rem;overflow-y:auto}
.module-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.mod-tab{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.mod-tab:hover{border-color:var(--border-strong);color:var(--text-primary)}
.mod-tab.active{background:var(--bg-accent);border-color:var(--border-accent);color:var(--text-accent);font-weight:600}
.mod-tab.complete{background:var(--bg-success);border-color:var(--border-success);color:var(--text-success)}
.form-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;max-width:820px}
.form-title{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:.2rem;display:flex;align-items:center;gap:.5rem}
.form-title i{font-size:18px;color:var(--text-accent)}
.form-subtitle{font-size:12px;color:var(--text-muted);margin-bottom:1.25rem;padding-left:26px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:.75rem}
.field-grid.full{grid-template-columns:1fr}
.field-grid.three{grid-template-columns:1fr 1fr 1fr}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:12px;font-weight:500;color:var(--text-secondary)}
.req{color:#dc2626;margin-left:2px}
.field-input{height:36px;border-radius:var(--radius);border:1px solid var(--border);background:#fff;color:var(--text-primary);padding:0 .75rem;font-size:13px;width:100%;transition:border-color .15s}
.field-input:focus{outline:none;border-color:var(--fill-accent);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
textarea.field-input{height:auto;padding:.5rem .75rem;resize:vertical;line-height:1.5}
select.field-input{cursor:pointer}
.section-divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
.section-head{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;text-transform:uppercase;letter-spacing:.04em}
.radio-group{display:flex;gap:.75rem;flex-wrap:wrap;padding-top:4px}
.radio-opt{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:13px;color:var(--text-primary)}
.radio-opt input{cursor:pointer;accent-color:var(--fill-accent)}
.ae-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:.5rem}
.ae-table th{text-align:left;padding:.5rem .75rem;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--surface-0)}
.ae-table td{padding:.4rem .5rem;border-bottom:1px solid var(--border)}
.ae-table tr:last-child td{border-bottom:none}
.add-btn{display:flex;align-items:center;gap:.4rem;background:none;border:1px dashed var(--border-strong);border-radius:var(--radius);padding:.4rem .75rem;font-size:12px;color:var(--text-secondary);cursor:pointer;margin-top:.75rem;transition:all .15s}
.add-btn:hover{border-color:var(--fill-accent);color:var(--text-accent);background:var(--bg-accent)}
.actions{display:flex;align-items:center;justify-content:flex-end;gap:.75rem;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);max-width:820px}
.btn-save{background:var(--fill-accent);color:#fff;border:none;border-radius:var(--radius);padding:.5rem 1.25rem;font-size:14px;cursor:pointer;font-weight:500;transition:background .15s}
.btn-save:hover{background:var(--fill-accent-hover)}
.btn-ghost{background:none;border:1px solid var(--border-strong);border-radius:var(--radius);padding:.5rem 1rem;font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.btn-ghost:hover{background:var(--surface-1);color:var(--text-primary)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-empty{background:var(--border-strong)}
.dot-partial{background:#f59e0b}
.dot-done{background:#22c55e}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#fff;border:1px solid var(--border-success);border-radius:var(--radius);padding:.6rem 1rem;font-size:13px;color:var(--text-success);display:flex;align-items:center;gap:.4rem;box-shadow:0 4px 16px rgba(0,0,0,.1);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateY(0)}
.incl-excl-item{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem .75rem;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.5rem;font-size:13px}
.criterion-label{font-size:10px;color:var(--text-muted);margin-bottom:2px;font-weight:600}
.vas-row{display:flex;align-items:center;gap:1rem;margin-bottom:.75rem}
.vas-label{font-size:13px;color:var(--text-secondary);width:210px;flex-shrink:0}
.vas-val{font-size:14px;font-weight:600;width:36px;text-align:right;color:var(--text-primary)}
input[type=range]{flex:1;accent-color:var(--fill-accent)}
.das28-box{background:var(--bg-accent);border:1px solid var(--border-accent-b);border-radius:var(--radius);padding:.85rem 1.1rem;display:flex;align-items:center;justify-content:space-between;margin-top:1rem}
.das28-label{font-size:13px;color:var(--text-accent);font-weight:500}
.das28-score{font-size:28px;font-weight:700;color:var(--text-accent)}
.das28-interp{font-size:11px;color:var(--text-accent);opacity:.8;margin-top:2px}
.lab-row{display:grid;grid-template-columns:1.4fr .7fr 1.1fr .6fr;gap:.5rem;align-items:center;margin-bottom:.4rem}
.lab-name{font-size:13px;color:var(--text-primary)}
.lab-ref{font-size:11px;color:var(--text-muted)}
.lab-header{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;padding-bottom:.4rem;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.oot-banner{background:var(--bg-warning);border:1px solid var(--border-warning);border-radius:var(--radius);padding:.6rem .85rem;font-size:13px;color:var(--text-warning);display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.disc-reason{display:flex;flex-direction:column;gap:.5rem;margin-top:.4rem}
.disc-reason label{display:flex;align-items:center;gap:.5rem;font-size:13px;cursor:pointer}
.disc-reason input{accent-color:var(--fill-accent)}
.alert-info{background:var(--bg-success);border:1px solid var(--border-success);border-radius:var(--radius);padding:.5rem .75rem;font-size:12px;color:var(--text-success);display:flex;align-items:center;gap:.4rem;margin-top:.75rem}
.alert-warn{background:var(--bg-warning);border:1px solid var(--border-warning);border-radius:var(--radius);padding:.5rem .75rem;font-size:12px;color:var(--text-warning);display:flex;align-items:center;gap:.4rem;margin-top:.75rem}
.alert-danger{background:var(--bg-danger);border:1px solid var(--border-danger);border-radius:var(--radius);padding:.5rem .75rem;font-size:12px;color:var(--text-danger);display:flex;align-items:center;gap:.4rem;margin-top:.75rem}
input[type=number].field-input::-webkit-inner-spin-button{opacity:.5}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="study-badge">ARTRA-301 · eCRF</span>
      <div>
        <div class="study-title">Electronic Case Report Form</div>
        <div class="study-sub">Phase III · Rheumatoid Arthritis · Double-blind, placebo-controlled</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text-muted)">Version 1.0 · For educational use only</div>
  </div>

  <div class="subject-bar">
    <div class="subject-field">
      <span class="subject-label">Subject ID</span>
      <span class="subject-val" id="sid-display">—</span>
    </div>
    <div class="subject-field">
      <span class="subject-label">Site</span>
      <select id="site-sel" onchange="updateSID()" style="border:1px solid var(--border);background:#fff;font-size:13px;color:var(--text-primary);cursor:pointer;padding:4px 8px;border-radius:var(--radius)">
        <option value="">Select site...</option>
        <option value="1001">1001 — Hospital Italiano, Buenos Aires</option>
        <option value="1002">1002 — Clínica Reina Fabiola, Córdoba</option>
        <option value="1003">1003 — Sanatorio El Carmen, Salta</option>
      </select>
    </div>
    <div class="subject-field">
      <span class="subject-label">Subject number</span>
      <input id="sub-num" type="number" min="1" max="999" placeholder="001" oninput="updateSID()" style="border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--text-primary);width:70px;padding:4px 8px;border-radius:var(--radius)">
    </div>
    <div class="subject-field">
      <span class="subject-label">Status</span>
      <span class="subject-val" style="font-size:12px" id="sub-status"><span class="status-dot dot-empty"></span>Not started</span>
    </div>
    <div class="subject-field" style="margin-left:auto">
      <span class="subject-label">Active visit</span>
      <span class="subject-val" style="font-size:12px;color:var(--text-accent)" id="visit-label-top">—</span>
    </div>
  </div>

  <div class="body">
    <div class="sidebar">
      <div class="sidebar-title">Visits</div>
      <div id="visit-nav"></div>
    </div>
    <div class="main" id="main-area"></div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i> <span id="toast-msg">Saved</span></div>

<script>
const visits=[
  {id:'scr',label:'Screening',num:'V1'},
  {id:'bl',label:'Baseline',num:'V2 · Week 0'},
  {id:'w4',label:'Week 4',num:'V3'},
  {id:'w8',label:'Week 8',num:'V4'},
  {id:'w16',label:'Week 16',num:'V5'},
  {id:'w24',label:'Week 24',num:'V6'},
  {id:'w36',label:'Week 36',num:'V7'},
  {id:'w52',label:'Week 52 — EOS',num:'V8'}
];

const visitMods={
  scr:['Informed Consent','Demographics','Incl/Excl Criteria','Vital Signs','Labs','Concomitant Meds','AE / SAE','Study Drug','Visit OOW','Discontinuation'],
  bl:['Demographics','Vital Signs','Efficacy','Global Assessment','Labs','Concomitant Meds','AE / SAE','Study Drug','Visit OOW','Discontinuation'],
  _def:['Vital Signs','Efficacy','Global Assessment','Labs','Concomitant Meds','AE / SAE','Study Drug','Visit OOW','Discontinuation']
};

let curVisit='scr';
let curMod=0;
let saved={};
let aes=[{term:'Nausea',onset:'2024-03-15',severity:'Mild',rel:'Possibly related',outcome:'Resolved',sae:false}];
let meds=[{name:'Methotrexate',dose:'15mg',freq:'Weekly',ind:'RA',ongoing:true}];

function getMods(vid){return visitMods[vid]||visitMods._def}

function renderNav(){
  document.getElementById('visit-nav').innerHTML=visits.map(v=>`
    <button class="visit-btn ${v.id===curVisit?'active':''}" onclick="setVisit('${v.id}')">
      <span class="visit-num">${v.num}</span>${v.label}
    </button>`).join('');
  const vl=visits.find(v=>v.id===curVisit);
  document.getElementById('visit-label-top').textContent=vl?vl.label:'—';
}

function setVisit(vid){curVisit=vid;curMod=0;renderNav();renderMain()}
function setMod(i){curMod=i;renderMain()}

function renderMain(){
  const ms=getMods(curVisit);
  const tabs=ms.map((m,i)=>{
    const k=`${curVisit}_${i}`;
    const done=saved[k]&&i!==curMod;
    return `<button class="mod-tab ${i===curMod?'active':''} ${done?'complete':''}" onclick="setMod(${i})">${m}</button>`;
  }).join('');

  document.getElementById('main-area').innerHTML=`
    <div class="module-tabs">${tabs}</div>
    <div class="form-card">${buildMod(ms[curMod])}</div>
    <div class="actions">
      <button class="btn-ghost" onclick="prevMod()"><i class="ti ti-arrow-left"></i> Previous</button>
      <button class="btn-save" onclick="saveMod()"><i class="ti ti-device-floppy"></i> Save module</button>
      <button class="btn-save" style="background:#16a34a" onclick="nextMod()">Next <i class="ti ti-arrow-right"></i></button>
    </div>`;

  document.querySelectorAll('.vas-slider').forEach(s=>{
    s.oninput=function(){
      const el=document.getElementById(this.dataset.out);
      if(el)el.textContent=this.value;
      calcDAS28();
    };
  });
  document.querySelectorAll('input[type=number]').forEach(el=>{
    el.oninput=function(){calcDAS28()};
  });
}

function prevMod(){if(curMod>0){curMod--;renderMain()}}
function nextMod(){const ms=getMods(curVisit);if(curMod<ms.length-1){curMod++;renderMain()}}

function saveMod(){
  const ms=getMods(curVisit);
  saved[`${curVisit}_${curMod}`]=true;
  showToast(`${ms[curMod]} saved`);
  document.getElementById('sub-status').innerHTML='<span class="status-dot dot-partial"></span>In progress';
  renderMain();
}

function calcDAS28(){
  const tj=parseFloat(document.getElementById('tj28')?.value||0);
  const sj=parseFloat(document.getElementById('sj28')?.value||0);
  const esr=parseFloat(document.getElementById('esr28')?.value||1);
  const gda=parseFloat(document.getElementById('gda28')?.value||0);
  if(!document.getElementById('das28-score'))return;
  const score=0.56*Math.sqrt(tj)+0.28*Math.sqrt(sj)+0.70*Math.log(esr)+0.014*gda;
  document.getElementById('das28-score').textContent=isNaN(score)?'—':score.toFixed(2);
  let interp='— enter values above';
  if(!isNaN(score)){
    if(score<2.6)interp='Remission';
    else if(score<3.2)interp='Low disease activity';
    else if(score<5.1)interp='Moderate disease activity';
    else interp='High disease activity';
  }
  const el=document.getElementById('das28-interp');
  if(el)el.textContent=interp;
}

function updateSID(){
  const site=document.getElementById('site-sel').value;
  const num=document.getElementById('sub-num').value;
  if(site&&num){
    document.getElementById('sid-display').textContent=`${site}-${String(num).padStart(3,'0')}`;
    document.getElementById('sub-status').innerHTML='<span class="status-dot dot-partial"></span>In progress';
  } else {
    document.getElementById('sid-display').textContent='—';
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function addAE(){aes.push({term:'',onset:'',severity:'Mild',rel:'Not related',outcome:'Ongoing',sae:false});renderMain()}
function addMed(){meds.push({name:'',dose:'',freq:'',ind:'',ongoing:true});renderMain()}

function buildMod(mod){
  if(mod==='Informed Consent')return modConsent();
  if(mod==='Demographics')return modDemo();
  if(mod==='Incl/Excl Criteria')return modInclExcl();
  if(mod==='Vital Signs')return modVS();
  if(mod==='Labs')return modLabs();
  if(mod==='Efficacy')return modEfficacy();
  if(mod==='Global Assessment')return modGlobal();
  if(mod==='Concomitant Meds')return modMedConc();
  if(mod==='AE / SAE')return modAE();
  if(mod==='Study Drug')return modDisp();
  if(mod==='Visit OOW')return modOOW();
  if(mod==='Discontinuation')return modDisc();
  return `<div style="color:var(--text-muted);text-align:center;padding:2rem">${mod}</div>`;
}

function modConsent(){return`
<div class="form-title"><i class="ti ti-file-check"></i>Informed consent</div>
<div class="form-subtitle">Screening only · Must be completed before any study procedure</div>
<div class="field-grid">
  <div class="field-group"><label class="field-label">ICF signature date<span class="req">*</span></label><input type="date" class="field-input"></div>
  <div class="field-group"><label class="field-label">ICF version signed<span class="req">*</span></label><input type="text" class="field-input" placeholder="e.g. v2.0 dated 01/15/2024"></div>
</div>
<hr class="section-divider">
<div class="section-head"><i class="ti ti-user" style="font-size:13px"></i>Witness / Legal representative</div>
<div class="field-grid">
  <div class="field-group"><label class="field-label">Was a witness required?</label>
    <div class="radio-group"><label class="radio-opt"><input type="radio" name="witness" value="no"> No</label><label class="radio-opt"><input type="radio" name="witness" value="yes"> Yes</label></div>
  </div>
  <div class="field-group"><label class="field-label">Witness signature date</label><input type="date" class="field-input"></div>
</div>
<div class="field-grid full"><div class="field-group"><label class="field-label">Comments</label><textarea class="field-input" rows="3" placeholder="Notes about the consent process..."></textarea></div></div>`;}

function modDemo(){return`
<div class="form-title"><i class="ti ti-id-badge"></i>Demographics</div>
<div class="form-subtitle">Subject baseline information</div>
<div class="field-grid three">
  <div class="field-group"><label class="field-label">Date of birth<span class="req">*</span></label><input type="date" class="field-input"></div>
  <div class="field-group"><label class="field-label">Age (years)<span class="req">*</span></label><input type="number" class="field-input" placeholder="0" min="18" max="99"></div>
  <div class="field-group"><label class="field-label">Sex at birth<span class="req">*</span></label><select class="field-input"><option value="">Select...</option><option>Male</option><option>Female</option></select></div>
</div>
<div class="field-grid three">
  <div class="field-group"><label class="field-label">Weight (kg)<span class="req">*</span></label><input type="number" class="field-input" placeholder="0.0" step="0.1"></div>
  <div class="field-group"><label class="field-label">Height (cm)<span class="req">*</span></label><input type="number" class="field-input" placeholder="0"></div>
  <div class="field-group"><label class="field-label">BMI (kg/m²)</label><input type="text" class="field-input" placeholder="Auto-calculated" readonly style="background:var(--surface-0)"></div>
</div>
<hr class="section-divider">
<div class="field-grid">
  <div class="field-group"><label class="field-label">Marital status</label><select class="field-input"><option value="">Select...</option><option>Single</option><option>Married</option><option>Divorced</option><option>Widowed</option></select></div>
  <div class="field-group"><label class="field-label">Years since RA diagnosis</label><input type="text" class="field-input" placeholder="e.g. 3 years 4 months"></div>
</div>
<div class="field-grid">
  <div class="field-group"><label class="field-label">MTX use at entry<span class="req">*</span></label>
    <div class="radio-group"><label class="radio-opt"><input type="radio" name="mtx" value="yes"> Yes</label><label class="radio-opt"><input type="radio" name="mtx" value="no"> No</label></div>
  </div>
  <div class="field-group"><label class="field-label">MTX dose (if applicable)</label><input type="text" class="field-input" placeholder="e.g. 15 mg weekly"></div>
</div>`;}

function modInclExcl(){
  const inc=['Age ≥18 and ≤75 years','RA diagnosis per ACR/EULAR 2010 criteria','DAS28-ESR ≥3.2 at Screening','MTX use for ≥12 weeks (if applicable)','Signed informed consent form'];
  const exc=['Use of biologic agents in the past 6 months','Active or recurrent infection','Pregnancy or breastfeeding','Severe renal impairment (CrCl <30 mL/min)','Known hypersensitivity to study drug'];
  return`
<div class="form-title"><i class="ti ti-list-check"></i>Inclusion / Exclusion criteria</div>
<div class="form-subtitle">All inclusion criteria must be YES · All exclusion criteria must be NO for subject to be eligible</div>
<div class="section-head">Inclusion</div>

<div class="section-head" style="margin-top:1rem">Exclusion</div>

function modLabs(){

    ['Pregnancy test (females)','—','Negative']
